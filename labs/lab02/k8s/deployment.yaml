apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab02
  labels:
    app: lab02
spec:

  replicas: 2
  selector:
    matchLabels:
      app: lab02
  template:
    metadata:
      labels:
        app: lab02

    spec:
      containers:
        - name: lab02
          image: andredsferreiraa/andre-kb:lab02-latest
          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          # readinessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: 8080
          #   initialDelaySeconds: 5

          # livenessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: 8080
          #   initialDelaySeconds: 10

      imagePullSecrets:
        - name: dockerhub-creds