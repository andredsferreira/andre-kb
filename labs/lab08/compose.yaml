services:
  lab08:
    depends_on:
      - roach-db
    build:
      context: .
    container_name: lab08-app
    hostname: lab08-app
    networks:
      - lab08-net
    ports:
      - 80:8080
    environment:
      - PQDB_PORT=roach-db
      - PQDB_PORT=8080
      - PQDB_USER=root
      - PQDB_PASSWORD=
      - PGDATABASE=lab08-db
      - ENV=dev
    deploy:
      restart_policy:
        condition: on-failure

  roach-db:
    image: cockroachdb/cockroach:latest-v25.4
    container_name: roach-db
    hostname: roach-db
    networks:
      - lab08-net
    ports:
      - 26257:26257
      - 8080:8080
    volumes:
      - roach-db:/cockroach/cockroach-data
    command: start-single-node --insecure

volumes:
  roach-db:

networks:
  lab08-net:
    driver: bridge
