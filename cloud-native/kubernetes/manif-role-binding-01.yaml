# The RoleBinding for the Role object from manif-role-01.yaml.

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: role-binding-01
  namespace: default
subjects:
- kind: ServiceAccount
  name: default
  namespace: default
roleRef:
  kind: Role
  name: role-01
  apiGroup: rbac.authorization.k8s.io
