# Another example of an HPA manifest with scale behaviour defined.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2
  maxReplicas: 20
  metrics:
  # Scale on CPU utilization.
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60       # Target 60% of CPU request.
  # Also scale on memory.
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75
  # Scale behaviour.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # Wait 60s before scaling up again.
      policies:
      - type: Pods
        value: 4                       # Add at most 4 pods per 60s.
        periodSeconds: 60
      - type: Percent
        value: 100                     # Or double the pods, whichever is higher.
        periodSeconds: 60
      selectPolicy: Max                # Use the policy that allows more replicas.
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 minutes before scaling down.
      policies:
      - type: Percent
        value: 25                      # Remove at most 25% of pods per 60s.
        periodSeconds: 60
