apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  clusterIP: None  # This makes it "headless"
  ports:
    - port: 27017
      name: mongodb
  selector:
    app: mongodb

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb  # Must match the headless Service name
  replicas: 3
  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: mongodb
          image: mongo:7.0
          command:
            - mongod
            - "--replSet"
            - rs0
            - "--bind_ip_all"
          ports:
            - containerPort: 27017
              name: mongodb
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 5
            periodSeconds: 10

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard  # adjust to your cluster's StorageClass
        resources:
          requests:
            storage: 10Gi

---

# Job to setup the MongoDB replica set itself (not to confund with Kubernetes
# ReplicaSet). This is needed in order to register the main write DB container
# and the replicated data ones (read only), the remaining 2.

apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-replicaset
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-init
          image: mongo:7.0
          command:
            - bash
            - "-c"
            - |
              # Wait for all mongod pods to be reachable
              for i in 0 1 2; do
                until mongosh --host mongodb-$i.mongodb --eval "print('ready')" ; do
                  echo "Waiting for mongodb-$i..."
                  sleep 5
                done
              done

              # Check if replica set is already initiated
              STATUS=$(mongosh --host mongodb-0.mongodb --quiet --eval "rs.status().ok" 2>/dev/null || echo "0")

              if [ "$STATUS" == "1" ]; then
                echo "Replica set already initiated. Skipping."
              else
                echo "Initiating replica set..."
                mongosh --host mongodb-0.mongodb --eval '
                  rs.initiate({
                    _id: "rs0",
                    members: [
                      { _id: 0, host: "mongodb-0.mongodb:27017" },
                      { _id: 1, host: "mongodb-1.mongodb:27017" },
                      { _id: 2, host: "mongodb-2.mongodb:27017" }
                    ]
                  })
                '
              fi
  backoffLimit: 5