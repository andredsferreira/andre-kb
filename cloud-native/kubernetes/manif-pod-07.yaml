# Broader example of usage of init containers (run before the main app
# container): testing a DB connection before spinning up the app container.

apiVersion: v1
kind: Pod
metadata:
  name: app-with-init
spec:
  initContainers:
    - name: wait-for-db
      image: busybox:1.36
      command:
        - "sh"
        - "-c"
        - |
          echo "Waiting for database to be ready..."
          until nc -z db-service 5432; do
            echo "  ...db not ready yet, retrying in 2s"
            sleep 2
          done
          echo "Database is ready!"
    - name: run-migrations
      image: my-app:2.4
      command: ["python", "manage.py", "migrate", "--noinput"]
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
  containers:
    - name: app
      image: my-app:2.4
      ports:
        - containerPort: 8000
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url